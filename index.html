<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CRUD Alumnos 4J</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>📚 Registro de Alumnos 4J</h1>

  <form id="alumnoForm" enctype="multipart/form-data">
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="number" name="edad" placeholder="Edad" required>
    <input type="text" name="salon" placeholder="Salón" required>
    <input type="file" name="foto" accept="image/*">
    <button type="submit">➕ Registrar Alumno</button>
  </form>

  <h2>👩‍🎓 Lista de Alumnos</h2>
  <div id="listaAlumnos">
    <!-- Tarjeta de ejemplo fija -->
    <div class="alumno-card">
      <h3>Alumno de ejemplo</h3>
      <p>Edad: --</p>
      <p>Salón: --</p>
      <img src="https://via.placeholder.com/150" alt="Foto">
      <div class="card-buttons">
        <button disabled>✏️ Editar</button>
        <button disabled>🗑️ Eliminar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
