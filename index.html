<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Alumnos 4J</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>📚 Registro de Alumnos 4J</h1>

  <!-- Formulario de registro -->
  <form id="alumnoForm" enctype="multipart/form-data">
    <input type="text" name="nombre" id="nombre" placeholder="Nombre del alumno" required>
    <input type="number" name="edad" id="edad" placeholder="Edad" required>
    <input type="text" name="salon" id="salon" placeholder="Salón" required>
    <input type="file" name="foto" id="foto" accept="image/*">
    <button type="submit" id="btnRegistrar">➕ Registrar Alumno</button>
  </form>

  <!-- Botones CRUD generales -->
  <div class="crud-buttons">
    <button id="btnLeer">👁️ Leer Alumnos</button>
    <button id="btnActualizar">✏️ Actualizar Alumno</button>
    <button id="btnEliminar">🗑️ Eliminar Alumno</button>
  </div>

  <!-- Lista de alumnos -->
  <h2>👩‍🎓 Lista de Alumnos</h2>
  <div id="listaAlumnos">
    <!-- Aquí se cargan dinámicamente las tarjetas -->
  </div>

  <script src="script.js"></script>
</body>
</html>
